[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oas-core"
version = "0.1.0"
description = "Open Audio Studio core: manifest, storage, db, queue, registry"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.6",
  "sqlalchemy>=2.0",
  "alembic>=1.13",
  "pyarrow>=15.0",
  "orjson>=3.10",
  "anyio>=4.3",
  "structlog>=24.1",
  "platformdirs>=4.2",
  "typing-extensions>=4.10",
]

[project.optional-dependencies]
s3 = ["boto3>=1.34"]
ray = ["ray[default]>=2.32"]
modal = ["modal>=0.64"]
# slurm has no Python dep; the backend shells out to sbatch/scancel.

[tool.setuptools.packages.find]
include = ["oas_core*"]
