services:
  server:
    build:
      context: ../..
      dockerfile: infra/docker/server.Dockerfile
    ports: ["8000:8000"]
    volumes:
      - oas_data:/data
    environment:
      OAS_LOG_LEVEL: INFO
      OAS_CORS_ORIGINS: http://localhost:3000

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on: [server]

volumes:
  oas_data:
